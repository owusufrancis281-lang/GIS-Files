<!DOCTYPE html>
<html>
<head>
<title>GIS Cloud Storage</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:40px;
}
.container{
background:white;
padding:30px;
border-radius:10px;
max-width:500px;
margin:auto;
}
button{
background:#0066cc;
color:white;
padding:12px 25px;
border:none;
border-radius:5px;
}
</style>
</head>

<body>

<div class="container">
<h1>GIS Cloud Storage</h1>

<p>Secure online file receiving system</p>

<form action="/upload" method="POST" enctype="multipart/form-data">

<input type="file" name="file" required>

<br><br>

<button type="submit">Upload File</button>

</form>

</div>

</body>
</html>
